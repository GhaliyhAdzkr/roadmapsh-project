<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<title>Tabs</title>
	</head>
	<body>
		<script>
			function openTab(event, tabID) {
				// Tab Buttons
				const buttons = document.querySelectorAll(".tab-btn");
				buttons.forEach((btn) => {
					btn.classList.remove("border-b-2");
					btn.classList.add("text-gray-500");
				});

				// Hide all content before show selected content
				const contents = document.querySelectorAll(".tab-content");
				contents.forEach((ctn) => {
					ctn.classList.replace("block", "hidden");
				});

				// Show Selected content based on tab button
				document
					.getElementById(tabID)
					.classList.replace("hidden", "block");

				// Toogle between Active and Inactive
				event.currentTarget.classList.remove("text-gray-500");
				event.currentTarget.classList.add("border-b-2");
			}
		</script>
		<div class="h-screen flex items-center">
			<div
				class="max-w-md mx-auto p-4 border rounded bg-black text-white shadow-sm"
			>
				<div class="flex gap-2 border-b border-gray-400 mb-4">
					<button
						onclick="openTab(event, 'tab1')"
						class="tab-btn px-4 py-2 font-medium border-b-2 border-white"
					>
						First Tab
					</button>
					<button
						onclick="openTab(event, 'tab2')"
						class="tab-btn px-4 py-2 font-medium text-gray-500"
					>
						Second Tab
					</button>
					<button
						onclick="openTab(event, 'tab3')"
						class="tab-btn px-4 py-2 font-medium text-gray-500"
					>
						Third Tab
					</button>
				</div>
				<div></div>
				<div id="tab1" class="tab-content block">
					<div class="text-xl mb-2">This is the First tab</div>
					<div class="w-full p-20 bg-white rounded"></div>
				</div>
				<div id="tab2" class="tab-content hidden">
					<div class="text-xl mb-2">This is the Second tab</div>
					<div class="w-full p-20 bg-red-500 rounded"></div>
				</div>
				<div id="tab3" class="tab-content hidden">
					<div class="text-xl mb-2">This is the Third tab</div>
					<div class="w-full p-20 bg-blue-500 rounded"></div>
				</div>
			</div>
		</div>
	</body>
</html>
