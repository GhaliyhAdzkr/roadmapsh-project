<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<title>Image Grid Layout</title>
	</head>
	<body>
		<div class="flex flex-col h-screen items-center justify-center">
			<div class="w-9/11">
                <div class="grid grid-cols-3 gap-2">
                    <div class="flex flex-col gap-2">
                        <img src="./src/01-foggy-beach.jpg" alt="">
                        <img src="./src/02-living-room.jpg" alt="">
                    </div>
                    <div class="flex flex-col gap-2">
                        <img src="./src/03-table-of-food.jpg" alt="">
                        <img src="./src/04-red-door.jpg" alt="">
                    </div>
                    <div class="flex flex-col gap-2">
                        <img src="./src/05-white-apartement.jpg" alt="">
                        <img src="./src/06-icy-mountain.jpg" alt="">
                    </div>
                </div>
            </div>
		</div>
	</body>
</html>
