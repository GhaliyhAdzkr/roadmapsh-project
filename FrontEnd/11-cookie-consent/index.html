<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<title>Cookie Consent</title>
	</head>
	<body>
		
		<div
			id="cookies"
			class="fixed bottom-5 right-5 flex flex-col w-50 h-auto gap-5 bg-blue-200 p-5 rounded-xl cursor-default"
		>
			<div onclick="closeCookies('cookies')" class="absolute top-2 right-5 hover:text-gray-500">
				&times;
			</div>
			<img src="./src/cookies.png" class="size-10" alt="" />

			<div class="flex flex-col gap-2">
				<div class="text-justify font-bold">
					We use cookies to improve your user experience
				</div>
				<button
                    onclick="closeCookies('cookies')"
					class="w-full bg-white rounded font-bold hover:bg-gray-200 py-1"
				>
					I Love Cookies
				</button>
			</div>
		</div>

        <script>
            const indicator = document.getElementById("cookies")
            const currentStatus = localStorage.getItem('cookies-status')
            
            if(currentStatus == 'closed') {
                indicator.classList.add("hidden")
            }

			function closeCookies(id) {
                localStorage.setItem ('cookies-status', 'closed')
                document
					.getElementById(id)
					.classList.add("hidden")
            }
		</script>

	</body>
</html>
